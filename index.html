<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلتي 🚀</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090f; --bg2:#0c1018; --bg3:#111827; --bg4:#1a2235;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --txt1:#eef2ff; --txt2:#8ea6cc; --txt3:#46607a;
  --blue:#3b82f6; --blue2:#60a5fa; --cyan:#38bdf8;
  --green:#10b981; --green2:#34d399; --purple:#8b5cf6;
  --amber:#f59e0b; --red:#ef4444;
}

body.light {
  --bg:#f1f5fb; --bg2:#e8edf8; --bg3:#ffffff; --bg4:#f8faff;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --txt1:#0f172a; --txt2:#4a6080; --txt3:#9ab0cc;
}

*,*::before,*::after{box-sizing:border-box;margin:0;}
html,body{height:100%;overflow:hidden; font-family:'Cairo',sans-serif; background:var(--bg); color:var(--txt1);}

/* Glassmorphism Reusable */
.glass { background:rgba(13,20,36,0.8); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:20px; }

/* --- KANBAN PREMIUM --- */
.task-card {
  background: rgba(30, 41, 59, 0.5);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
  transition: all 0.3s ease;
  cursor: grab;
  position: relative;
  min-height: 80px;
}
.task-card:hover { transform: translateY(-4px); border-color: var(--blue2); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
.task-card::before { content:''; position:absolute; right:0; top:12px; bottom:12px; width:4px; border-radius:4px 0 0 4px; background:var(--tc, var(--blue)); }

/* --- CERTIFICATES ROYAL FRAME --- */
.cert-card {
  background: #1a1410;
  padding: 15px;
  border: 8px solid #3d2b1f;
  border-image: linear-gradient(to bottom right, #b8860b, #ffd700, #b8860b) 1;
  box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 0 30px rgba(0,0,0,0.5);
  border-radius: 2px;
  height: 250px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.4s;
}
.cert-card:hover { transform: scale(1.03) rotate(1deg); }
.cert-card img { width: 100%; height: 100%; object-fit: contain; }

/* --- CLEAN NOTES --- */
.note-card {
  width: 260px; border-radius: 4px 4px 18px 4px; padding: 18px;
  box-shadow: 5px 5px 15px rgba(0,0,0,0.2); transition: 0.3s;
  background: var(--note-bg, #fde047); color: #1a1a1a;
}
.note-card:hover { transform: rotate(1deg) translateY(-5px); }

/* --- HEATMAP & CHARTS --- */
#heatmapGrid { display: grid; grid-auto-flow: column; gap: 4px; padding: 10px 0; }
.hm-cell { width: 13px; height: 13px; border-radius: 2px; transition: 0.2s; }
.hm-cell:hover { transform: scale(1.4); z-index: 10; outline: 1px solid #fff; }
.chart-container { height: 220px; position: relative; }

/* --- SCROLLBAR --- */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

.section { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding-bottom: 40px; }
.section.active { display: flex; }

#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; z-index: 1000; opacity:0; transition: 0.3s; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

.modal-bg { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.show { display: flex; }
</style>
</head>
<body>

<div id="loginOverlay" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;">
    <div class="text-center">
        <div class="loader mx-auto mb-4" style="width:40px;height:40px;border:4px solid var(--border);border-left-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;"></div>
        <button id="gLoginBtn" onclick="window.loginWithGoogle()" class="btn-primary bg-white text-black px-8 py-3 rounded-xl font-bold">تسجيل الدخول سحابياً</button>
    </div>
</div>

<div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="w-64 border-l border-white/5 bg-[#0d1527] p-5 flex flex-col gap-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">🚀</div>
            <h1 class="text-xl font-black">رحلتي</h1>
        </div>
        <nav class="flex flex-col gap-1">
            <button onclick="switchTab('today')" id="btn-today" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5 active">🎯 يومي</button>
            <button onclick="switchTab('kanban')" id="btn-kanban" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5">📋 بورد المهام</button>
            <button onclick="switchTab('notes')" id="btn-notes" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5">📝 الملاحظات</button>
            <button onclick="switchTab('certs')" id="btn-certs" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5">🎓 شهاداتي</button>
            <button onclick="switchTab('extras')" id="btn-extras" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5">✨ الأدوات</button>
        </nav>
        <div class="mt-auto pt-4 border-t border-white/5">
            <button onclick="logoutUser()" class="text-red-500 font-bold p-2 w-100 text-right">🚪 خروج</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="p-4 border-b border-white/5 flex justify-between items-center bg-black/20">
            <div id="dateDisplay" class="font-bold text-sm text-blue-400"></div>
            <div class="flex items-center gap-3">
                <span id="uName" class="text-xs font-bold opacity-60"></span>
                <div id="uAvatar" class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-black">?</div>
            </div>
        </header>

        <div id="content" class="flex-1 overflow-y-auto p-6">
            
            <section id="sec-today" class="section active">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black">هنعمل إيه النهاردة؟</h2>
                    <button onclick="openArchive('today')" class="bg-white/5 px-4 py-2 rounded-lg text-sm border border-white/10">📦 الأرشيف</button>
                </div>
                <div class="grid grid-cols-4 gap-4 mb-6">
                    <div class="glass p-4 text-center"><div id="sDoneToday" class="text-2xl font-black text-green-400">0</div><div class="text-[10px] opacity-50">أنجزت</div></div>
                    <div class="glass p-4 text-center"><div id="sTotalToday" class="text-2xl font-black">0</div><div class="text-[10px] opacity-50">إجمالي</div></div>
                    <div class="glass p-4 text-center"><div id="streakNum" class="text-2xl font-black text-amber-500">0</div><div class="text-[10px] opacity-50">يوم متتالي</div></div>
                    <div class="glass p-4 text-center"><div id="progressPct" class="text-2xl font-black text-blue-400">0%</div><div class="text-[10px] opacity-50">التقدم</div></div>
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="todayIn" class="flex-1 bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-blue-500" placeholder="مهمة سريعة...">
                    <button onclick="addTodayTask()" class="bg-blue-600 px-6 rounded-xl font-bold">إضافة</button>
                </div>
                <div id="todayList" class="flex flex-col gap-2"></div>
            </section>

            <section id="sec-kanban" class="section">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-black">بورد المهام ✨</h2>
                    <div class="flex gap-2 bg-white/5 p-2 rounded-xl border border-white/10">
                        <input type="text" id="kanbanIn" class="bg-transparent outline-none text-sm p-1" placeholder="مشروع جديد؟">
                        <button onclick="addTask()" class="bg-blue-600 px-4 py-1 rounded-lg text-sm">إضافة</button>
                    </div>
                </div>
                <div class="flex gap-4 h-full">
                    <div class="flex-1 flex flex-col bg-black/20 rounded-2xl p-3">
                        <h3 class="text-sm font-bold opacity-40 mb-3 pr-2">لسه هبدأ</h3>
                        <div id="todo" class="flex-1 overflow-y-auto" ondragover="allowDrop(event)" ondrop="drop(event, 'todo')"></div>
                    </div>
                    <div class="flex-1 flex flex-col bg-black/20 rounded-2xl p-3">
                        <h3 class="text-sm font-bold text-amber-500 mb-3 pr-2">شغال عليه</h3>
                        <div id="inprogress" class="flex-1 overflow-y-auto" ondragover="allowDrop(event)" ondrop="drop(event, 'inprogress')"></div>
                    </div>
                    <div class="flex-1 flex flex-col bg-black/20 rounded-2xl p-3">
                        <h3 class="text-sm font-bold text-green-500 mb-3 pr-2">خلصته ✅</h3>
                        <div id="done" class="flex-1 overflow-y-auto" ondragover="allowDrop(event)" ondrop="drop(event, 'done')"></div>
                    </div>
                </div>
            </section>

            <section id="sec-notes" class="section">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black">الملاحظات 📝</h2>
                    <button onclick="addNote()" class="bg-blue-600 px-5 py-2 rounded-xl font-bold">➕ ملاحظة</button>
                </div>
                <div id="notesBoard" class="flex flex-wrap gap-6"></div>
            </section>

            <section id="sec-certs" class="section">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black">شهاداتي 🎓</h2>
                    <button onclick="document.getElementById('certIn').click()" class="bg-blue-600 px-5 py-2 rounded-xl font-bold">رفع شهادة</button>
                    <input type="file" id="certIn" class="hidden" onchange="handleCertUpload(this)">
                </div>
                <div id="certsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <section id="sec-extras" class="section">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black">الأدوات والإحصائيات ✨</h2>
                    <button onclick="openArchive('years')" class="bg-white/5 px-4 py-2 rounded-lg text-xs border border-white/10">📂 أرشيف السنين</button>
                </div>
                
                <div class="glass p-6 mb-6">
                    <h3 class="font-bold mb-4 flex items-center gap-2">🟩 نشاطك السنوي <span id="currentYearDisplay" class="opacity-40"></span></h3>
                    <div class="overflow-x-auto" dir="ltr">
                        <div id="heatmapGrid"></div>
                    </div>
                    <div class="flex gap-2 items-center text-[10px] mt-4 opacity-40">
                        <span>أقل</span>
                        <div class="w-3 h-3 bg-white/10 rounded-sm"></div>
                        <div class="w-3 h-3 bg-green-900 rounded-sm"></div>
                        <div class="w-3 h-3 bg-green-700 rounded-sm"></div>
                        <div class="w-3 h-3 bg-green-500 rounded-sm"></div>
                        <div class="w-3 h-3 bg-green-300 rounded-sm"></div>
                        <span>أكثر</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass p-6">
                        <h3 class="text-sm font-bold opacity-50 mb-4">توزيع المهام (بالأقسام)</h3>
                        <div class="chart-container"><canvas id="pieChart"></canvas></div>
                    </div>
                    <div class="glass p-6">
                        <h3 class="text-sm font-bold opacity-50 mb-4">إنجاز آخر 7 أيام (%)</h3>
                        <div class="chart-container"><canvas id="lineChart"></canvas></div>
                    </div>
                </div>
            </section>

        </div>
    </main>
</div>

<div id="taskModal" class="modal-bg">
    <div class="glass w-full max-w-4xl h-[85vh] flex flex-col overflow-hidden">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h2 id="mTitle" class="text-xl font-black">اسم المهمة</h2>
            <button onclick="closeModal()" class="text-2xl opacity-40 hover:opacity-100">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 space-y-6">
                <div>
                    <h4 class="text-xs font-bold opacity-30 uppercase tracking-widest mb-3">الدروس / الخطوات</h4>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="subIn" class="flex-1 bg-white/5 border border-white/10 rounded-lg p-2 text-sm outline-none" placeholder="أضف درساً...">
                        <button onclick="addSubtask()" class="bg-blue-600 px-4 rounded-lg">➕</button>
                    </div>
                    <div id="subList" class="space-y-3"></div>
                </div>
            </div>
            <div class="space-y-4">
                <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                    <h4 class="text-[10px] font-bold opacity-30 uppercase mb-3">ملاحظات عامة</h4>
                    <textarea id="mDesc" oninput="saveDataSilently()" class="w-full bg-transparent border-none outline-none text-sm min-h-[200px] resize-none" placeholder="اكتب وصفاً أو ملاحظات..."></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const FB = { apiKey: "AIzaSyBbdeRIp_cbN7LP3dKovOmfCHTxseM-zro", authDomain: "rehlaty-final.firebaseapp.com", projectId: "rehlaty-final", storageBucket: "rehlaty-final.firebasestorage.app", messagingSenderId: "332709629068", appId: "1:332709629068:web:cdfb8f40dfa4c74d31ffa9" };
const fbApp = initializeApp(FB);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const gProv = new GoogleAuthProvider();

let user = null, activTask = null;
let S = {
    tasks: [], todayTasks: [], certs: [], notes: [],
    history: {}, streak: 0, lastDate: "",
    archive: { years: {}, tasks: [] },
    tagColors: {"تصميم":"#ec4899", "برمجة":"#3b82f6", "تعلم":"#10b981"}
};

/* --- CORE FUNCTIONS --- */
window.saveData = async () => {
    renderAll();
    localStorage.setItem("rehlaty_data", JSON.stringify(S));
    if(user) await setDoc(doc(db, "rehlaty_users", user.uid), S);
};

window.saveDataSilently = async () => {
    localStorage.setItem("rehlaty_data", JSON.stringify(S));
    if(user) await setDoc(doc(db, "rehlaty_users", user.uid), S);
};

window.showToast = (msg) => {
    const t = document.getElementById("toast");
    t.textContent = msg; t.className = "show bg-blue-600 font-bold shadow-xl";
    setTimeout(() => t.className = "", 3000);
};

/* --- RENDER LOGIC --- */
function renderAll() {
    renderToday();
    renderKanban();
    renderNotes();
    renderCerts();
    updateStats();
}

// TODAY
function renderToday() {
    const list = document.getElementById("todayList");
    list.innerHTML = S.todayTasks.map(t => `
        <div class="flex items-center gap-3 bg-white/5 p-3 rounded-xl border border-white/5 ${t.done ? 'opacity-40' : ''}">
            <input type="checkbox" ${t.done?'checked':''} onchange="toggleToday('${t.id}')" class="w-5 h-5 rounded-full border-white/20 bg-transparent">
            <span class="flex-1 text-sm ${t.done?'line-through':''}">${t.text}</span>
            <button onclick="delToday('${t.id}')" class="opacity-30 hover:text-red-500">✕</button>
        </div>
    `).join("");
}
window.addTodayTask = () => {
    const inp = document.getElementById("todayIn");
    if(!inp.value.trim()) return;
    S.todayTasks.unshift({ id: Date.now(), text: inp.value, done: false });
    inp.value = ""; saveData();
};
window.toggleToday = id => {
    const t = S.todayTasks.find(x => x.id == id);
    t.done = !t.done;
    if(t.done) showToast("عاش يا بطل! 🚀");
    saveData();
};
window.delToday = id => { S.todayTasks = S.todayTasks.filter(x => x.id != id); saveData(); };

// KANBAN
function renderKanban() {
    const cols = { todo: "", inprogress: "", done: "" };
    S.tasks.forEach(t => {
        const pct = t.subs && t.subs.length ? Math.round(t.subs.filter(s=>s.done).length / t.subs.length * 100) : 0;
        cols[t.status] += `
            <div class="task-card" draggable="true" ondragstart="window.drag(event, '${t.id}')" style="--tc: ${S.tagColors[t.tag]||'#3b82f6'}">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-white/5 border border-white/10 uppercase">${t.tag||'عام'}</span>
                    <button onclick="delTask('${t.id}')" class="text-xs opacity-20 hover:opacity-100">✕</button>
                </div>
                <h4 class="text-xs font-bold mb-3 cursor-pointer" onclick="openTask('${t.id}')">${t.text}</h4>
                <div class="h-1 bg-white/5 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-500" style="width:${pct}%"></div>
                </div>
            </div>
        `;
    });
    ["todo", "inprogress", "done"].forEach(id => document.getElementById(id).innerHTML = cols[id]);
}
window.addTask = () => {
    const inp = document.getElementById("kanbanIn");
    if(!inp.value.trim()) return;
    S.tasks.unshift({ id: 't'+Date.now(), text: inp.value, status: 'todo', subs: [], tag: 'تصميم' });
    inp.value = ""; saveData();
};
window.drag = (ev, id) => ev.dataTransfer.setData("tid", id);
window.allowDrop = ev => ev.preventDefault();
window.drop = (ev, status) => {
    const id = ev.dataTransfer.getData("tid");
    const t = S.tasks.find(x => x.id == id);
    if(t) { t.status = status; saveData(); }
};
window.delTask = id => { if(confirm("حذف المهمة؟")) { S.tasks = S.tasks.filter(x=>x.id != id); saveData(); } };

// MODAL & SUBS
window.openTask = id => {
    activTask = id;
    const t = S.tasks.find(x => x.id == id);
    document.getElementById("mTitle").textContent = t.text;
    document.getElementById("mDesc").value = t.desc || "";
    renderSubs();
    document.getElementById("taskModal").classList.add("show");
};
window.closeModal = () => {
    const t = S.tasks.find(x => x.id == activTask);
    t.desc = document.getElementById("mDesc").value;
    saveData();
    document.getElementById("taskModal").classList.remove("show");
};
function renderSubs() {
    const t = S.tasks.find(x => x.id == activTask);
    document.getElementById("subList").innerHTML = (t.subs||[]).map((s, i) => `
        <div class="bg-white/5 border border-white/5 p-4 rounded-xl space-y-4">
            <div class="flex items-center gap-3">
                <input type="checkbox" ${s.done?'checked':''} onchange="toggleSub(${i})" class="w-4 h-4 rounded-full border-white/10">
                <span class="flex-1 text-sm font-bold">${s.text}</span>
                <button onclick="delSub(${i})" class="opacity-20">✕</button>
            </div>
            
            <div class="space-y-2">
                <div class="flex justify-between items-center"><span class="text-[9px] opacity-30 font-bold">ملاحظات الدرس</span><button onclick="addSubNote(${i})" class="text-[9px] bg-white/5 px-2 py-0.5 rounded border border-white/10">➕ نص</button></div>
                ${(s.notes||[]).map((n, ni) => `
                    <div class="flex gap-2">
                        <textarea oninput="updateSubNote(${i}, ${ni}, this.value)" class="flex-1 bg-black/30 p-2 rounded-lg text-xs outline-none border border-white/5 resize-none h-16">${n}</textarea>
                        <button onclick="delSubNote(${i}, ${ni})" class="text-[10px] text-red-500">✕</button>
                    </div>
                `).join("")}
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center"><span class="text-[9px] opacity-30 font-bold">فيديوهات</span><button onclick="addSubVid(${i})" class="text-[9px] bg-white/5 px-2 py-0.5 rounded border border-white/10">➕ فيديو</button></div>
                ${(s.vids||[]).map((v, vi) => {
                    const yid = v.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=))([\w\-]{11})/);
                    return `
                    <div class="space-y-2">
                        <div class="flex gap-2"><input type="text" value="${v}" onchange="updateSubVid(${i}, ${vi}, this.value)" class="flex-1 bg-black/30 p-1 rounded-lg text-[10px] border border-white/5"><button onclick="delSubVid(${i}, ${vi})" class="text-red-500">✕</button></div>
                        ${yid ? `<div class="aspect-video rounded-lg overflow-hidden border border-white/10 shadow-lg cursor-pointer" onclick="window.open('${v}')"><img src="https://img.youtube.com/vi/${yid[1]}/hqdefault.jpg" class="w-full h-full object-cover"></div>`:''}
                    </div>`;
                }).join("")}
            </div>
        </div>
    `).join("");
}
window.addSubtask = () => {
    const t = S.tasks.find(x => x.id == activTask);
    const inp = document.getElementById("subIn");
    if(!inp.value) return;
    if(!t.subs) t.subs = [];
    t.subs.push({ text: inp.value, done: false, vids: [], notes: [] });
    inp.value = ""; renderSubs(); saveDataSilently();
};
window.toggleSub = i => { S.tasks.find(x=>x.id==activTask).subs[i].done = !S.tasks.find(x=>x.id==activTask).subs[i].done; renderSubs(); saveDataSilently(); };
window.delSub = i => { S.tasks.find(x=>x.id==activTask).subs.splice(i, 1); renderSubs(); saveDataSilently(); };
window.addSubNote = i => { const s = S.tasks.find(x=>x.id==activTask).subs[i]; if(!s.notes) s.notes = []; s.notes.push(""); renderSubs(); saveDataSilently(); };
window.updateSubNote = (i, ni, v) => { S.tasks.find(x=>x.id==activTask).subs[i].notes[ni] = v; saveDataSilently(); };
window.delSubNote = (i, ni) => { S.tasks.find(x=>x.id==activTask).subs[i].notes.splice(ni, 1); renderSubs(); saveDataSilently(); };
window.addSubVid = i => { const s = S.tasks.find(x=>x.id==activTask).subs[i]; if(!s.vids) s.vids = []; s.vids.push(""); renderSubs(); saveDataSilently(); };
window.updateSubVid = (i, vi, v) => { S.tasks.find(x=>x.id==activTask).subs[i].vids[vi] = v; renderSubs(); saveDataSilently(); };
window.delSubVid = (i, vi) => { S.tasks.find(x=>x.id==activTask).subs[i].vids.splice(vi, 1); renderSubs(); saveDataSilently(); };

// NOTES (Clean)
function renderNotes() {
    document.getElementById("notesBoard").innerHTML = S.notes.map(n => `
        <div class="note-card" style="--note-bg: ${n.color||'#fde047'}">
            <div class="flex justify-between items-start mb-2">
                <input type="color" value="${n.color||'#fde047'}" onchange="updateNoteColor('${n.id}', this.value)" class="w-4 h-4 rounded-full border-none p-0 bg-transparent cursor-pointer">
                <button onclick="delNote('${n.id}')" class="opacity-40">✕</button>
            </div>
            <textarea oninput="updateNoteText('${n.id}', this.value)" class="w-full bg-transparent border-none outline-none font-bold text-sm resize-none h-40" placeholder="اكتب ملاحظاتك...">${n.text||""}</textarea>
        </div>
    `).join("");
}
window.addNote = () => { S.notes.unshift({ id: Date.now(), text: "", color: "#fde047" }); renderNotes(); saveDataSilently(); };
window.updateNoteText = (id, v) => { S.notes.find(x=>x.id == id).text = v; saveDataSilently(); };
window.updateNoteColor = (id, v) => { S.notes.find(x=>x.id == id).color = v; renderNotes(); saveDataSilently(); };
window.delNote = id => { if(confirm("حذف؟")) { S.notes = S.notes.filter(x=>x.id != id); renderNotes(); saveDataSilently(); } };

// CERTS (Royal)
function renderCerts() {
    document.getElementById("certsList").innerHTML = S.certs.map(c => `
        <div class="cert-card" onclick="window.open('${c.url}')">
            <img src="${c.data}" onerror="this.src='https://placehold.co/400x300/1a1a1a/gold?text=CERTIFICATE'">
            <div class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 flex items-center justify-center transition-opacity">

            </div>

async function handleCertUpload(inp) {
    const file = inp.files[0]; if(!file) return;
    showToast("جاري الرفع...");
    const r = new FileReader();
    r.onload = async e => {
        const url = prompt("رابط الملف على جوجل درايف:");
        if(url) {
            S.certs.unshift({ id: Date.now(), data: e.target.result, url: url });
            saveData();
        }
    };
    r.readAsDataURL(file);
}
window.delCert = id => { S.certs = S.certs.filter(x=>x.id != id); saveData(); };

// ANALYTICS (Heatmap & Charts)
function renderHeatmap() {
    const grid = document.getElementById("heatmapGrid");
    const year = new Date().getFullYear();
    document.getElementById("currentYearDisplay").textContent = year;
    const start = new Date(year, 0, 1);
    const end = new Date(year, 11, 31);
    let html = "";
    const cursor = new Date(start); cursor.setDate(cursor.getDate() - cursor.getDay());
    while(cursor <= end || cursor.getDay() != 0) {
        const dStr = cursor.toISOString().split("T")[0];
        const val = S.history[dStr] || 0;
        const color = val == 0 ? 'rgba(255,255,255,0.05)' : val < 30 ? '#064e3b' : val < 60 ? '#065f46' : val < 90 ? '#047857' : '#10b981';
        html += `<div class="hm-cell" title="${dStr}: ${val}%" style="background:${color}"></div>`;
        cursor.setDate(cursor.getDate() + 1);
    }
    grid.innerHTML = html;
}

let pieIns, lineIns;
function renderCharts() {
    const tagCounts = {};
    S.tasks.forEach(t => tagCounts[t.tag] = (tagCounts[t.tag]||0) + 1);
    const pData = Object.values(tagCounts), pLabels = Object.keys(tagCounts);
    
    if(pieIns) pieIns.destroy();
    pieIns = new Chart(document.getElementById("pieChart"), {
        type: 'doughnut',
        data: { labels: pLabels, datasets: [{ data: pData, backgroundColor: ['#ec4899','#3b82f6','#10b981','#f59e0b'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#8ea6cc', font: { family: 'Cairo' } } } } }
    });

    const hLabels = [], hData = [];
    for(let i=6; i>=0; i--) {
        const d = new Date(); d.setDate(d.getDate()-i);
        const ds = d.toISOString().split("T")[0];
        hLabels.push(new Intl.DateTimeFormat('ar-EG', {weekday:'short'}).format(d));
        hData.push(S.history[ds] || 0);
    }
    if(lineIns) lineIns.destroy();
    lineIns = new Chart(document.getElementById("lineChart"), {
        type: 'line',
        data: { labels: hLabels, datasets: [{ label: 'النسبة %', data: hData, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59,130,246,0.1)' }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#46607a' } }, x: { grid: { display: false }, ticks: { color: '#46607a' } } } }
    });
}

function updateStats() {
    const done = S.todayTasks.filter(t=>t.done).length, total = S.todayTasks.length;
    const pct = total ? Math.round(done/total*100) : 0;
    document.getElementById("sDoneToday").textContent = done;
    document.getElementById("sTotalToday").textContent = total;
    document.getElementById("progressPct").textContent = pct + "%";
    document.getElementById("streakNum").textContent = S.streak || 0;
    
    const today = new Date().toISOString().split("T")[0];
    if(total > 0) S.history[today] = pct;
}

/* --- AUTH & INIT --- */
onAuthStateChanged(auth, async u => {
    if(u) {
        user = u;
        document.getElementById("uName").textContent = u.displayName;
        document.getElementById("uAvatar").textContent = u.displayName[0];
        const snap = await getDoc(doc(db, "rehlaty_users", u.uid));
        if(snap.exists()) S = { ...S, ...snap.data() };
        
        // Auto archive past year check
        const currentYear = new Date().getFullYear();
        const lastSavedYear = S.lastYear || currentYear;
        if(currentYear > lastSavedYear) {
            S.archive.years[lastSavedYear] = { history: { ...S.history }, tasks: [...S.tasks] };
            S.history = {}; S.lastYear = currentYear;
        }

        document.getElementById("loginOverlay").style.display = "none";
        renderAll(); renderHeatmap(); renderCharts();
    } else {
        document.getElementById("loginOverlay").style.display = "flex";
    }
});

window.loginWithGoogle = () => signInWithPopup(auth, gProv);
window.logoutUser = () => signOut(auth);
window.switchTab = t => {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active", "bg-white/10"));
    document.getElementById("sec-"+t).classList.add("active");
    document.getElementById("btn-"+t).classList.add("active", "bg-white/10");
    if(t == 'extras') { setTimeout(() => { renderHeatmap(); renderCharts(); }, 100); }
};

setInterval(() => {

}, 1000);
