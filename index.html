<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلتي 🚀</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090f; --bg2:#0c1018; --bg3:#111827; --bg4:#1a2235;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --txt1:#eef2ff; --txt2:#8ea6cc; --txt3:#46607a;
  --blue:#3b82f6; --blue2:#60a5fa; --cyan:#38bdf8;
  --green:#10b981; --green2:#34d399; --purple:#8b5cf6;
  --amber:#f59e0b; --red:#ef4444;
}

body{font-family:'Cairo',sans-serif; background:var(--bg); color:var(--txt1); overflow:hidden;}

/* --- LUXURY GLASS KANBAN --- */
.task-card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  word-break: break-word;
}
.task-card:hover { transform: translateY(-5px); border-color: var(--blue2); background: rgba(255,255,255,0.06); }
.task-card::before { content:''; position:absolute; right:0; top:15px; bottom:15px; width:4px; border-radius:4px 0 0 4px; background:var(--tc, var(--blue)); }

/* --- PREMIUM NOTES --- */
.note-card {
  width: 280px; border-radius: 4px 4px 20px 4px; padding: 20px;
  background: var(--note-bg, #fde047); color: #1a1a1a;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.3); transition: 0.3s;
}
.note-card textarea { background:transparent; border:none; outline:none; line-height:1.6; font-weight:600; width:100%; height:180px; resize:none; }

/* --- ROYAL CERTIFICATES --- */
.cert-card {
  background: #111; border: 8px solid #2a1a10; border-radius: 4px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6); position: relative; height: 240px;
  display:flex; align-items:center; justify-content:center; padding:10px; cursor:pointer;
}
.cert-card img { max-width:100%; max-height:100%; object-fit:contain; }

/* --- HEATMAP STYLE --- */
.hm-cell { width: 12px; height: 12px; border-radius: 2px; }
.hm-col { display:grid; grid-template-rows: repeat(7, 12px); gap:3px; }
.hm-month-sep { border-left: 1px dashed rgba(255,255,255,0.1); padding-left: 3px; margin-left: 3px; }

.section { display:none; flex:1; flex-direction:column; overflow-y:auto; padding-bottom:50px; }
.section.active { display:flex; }
.modal-bg { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); display:none; align-items:center; justify-content:center; }
.modal-bg.show { display:flex; }
</style>
</head>
<body>

<div id="app" class="flex h-screen">
  <aside class="w-64 bg-[#090c14] border-l border-white/5 p-6 flex flex-col gap-8">
    <div class="text-2xl font-black text-blue-500">رحلتي</div>
    <nav class="flex flex-col gap-2">
      <button onclick="switchTab('today')" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5 active">🎯 يومي</button>
      <button onclick="switchTab('kanban')" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5">📋 بورد المهام</button>
      <button onclick="switchTab('notes')" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5">📝 الملاحظات</button>
      <button onclick="switchTab('certs')" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5">🎓 شهاداتي</button>
      <button onclick="switchTab('extras')" class="nav-btn text-right p-3 rounded-xl hover:bg-white/5">✨ الأدوات</button>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-[#07090f]">
    <header class="p-4 border-b border-white/5 flex justify-between items-center">
      <div id="dateDisplay" class="text-sm opacity-50"></div>
      <div id="uName" class="font-bold">مرحباً بك</div>
    </header>

    <div id="content" class="flex-1 p-8 overflow-y-auto">
      
      <section id="sec-today" class="section active">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-4xl font-black">اليوم</h2>
          <button onclick="openArchive('today')" class="bg-white/5 px-4 py-2 rounded-lg border border-white/10 text-xs">📦 الأرشيف</button>
        </div>
        <div class="flex gap-4 mb-8">
          <input type="text" id="todayIn" class="flex-1 bg-white/5 border border-white/10 rounded-xl p-4 outline-none" placeholder="مهمة سريعة...">
          <button onclick="addTodayTask()" class="bg-blue-600 px-8 rounded-xl font-bold">إضافة</button>
        </div>
        <div id="todayList" class="space-y-3"></div>
      </section>

      <section id="sec-kanban" class="section">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-black">بورد المهام</h2>
          <div class="flex gap-2 bg-white/5 p-2 rounded-xl border border-white/10">
            <input type="text" id="kanbanIn" class="bg-transparent px-2 outline-none" placeholder="مشروع جديد؟">
            <button onclick="addTask()" class="bg-blue-600 px-4 py-1 rounded-lg">إضافة</button>
          </div>
        </div>
        <div class="flex gap-6 h-full">
          <div class="flex-1 bg-black/20 rounded-2xl p-4 flex flex-col">
            <h3 class="opacity-40 font-bold mb-4">لسه هبدأ</h3>
            <div id="todo" class="flex-1" ondragover="allowDrop(event)" ondrop="drop(event, 'todo')"></div>
          </div>
          <div class="flex-1 bg-black/20 rounded-2xl p-4 flex flex-col">
            <h3 class="text-amber-500 font-bold mb-4">شغال عليه</h3>
            <div id="inprogress" class="flex-1" ondragover="allowDrop(event)" ondrop="drop(event, 'inprogress')"></div>
          </div>
          <div class="flex-1 bg-black/20 rounded-2xl p-4 flex flex-col">
            <h3 class="text-green-500 font-bold mb-4">خلصته</h3>
            <div id="done" class="flex-1" ondragover="allowDrop(event)" ondrop="drop(event, 'done')"></div>
          </div>
        </div>
      </section>

      <section id="sec-notes" class="section">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-black">الملاحظات</h2>
          <button onclick="addNote()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold">➕ ملاحظة</button>
        </div>
        <div id="notesBoard" class="flex flex-wrap gap-6"></div>
      </section>

      <section id="sec-certs" class="section">
        <h2 class="text-3xl font-black mb-8">شهاداتي</h2>
        <div id="certsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        <button onclick="document.getElementById('certIn').click()" class="mt-8 bg-blue-600 px-6 py-3 rounded-xl font-bold">رفع شهادة</button>
        <input type="file" id="certIn" class="hidden" onchange="handleCertUpload(this)">
      </section>

      <section id="sec-extras" class="section">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-black">الأدوات</h2>
          <button onclick="openArchive('years')" class="text-xs opacity-40">📂 أرشيف السنين</button>
        </div>
        <div class="bg-white/5 p-6 rounded-2xl border border-white/5 mb-8">
          <h3 class="font-bold mb-4 opacity-50">🟩 نشاطك السنوي</h3>
          <div class="overflow-x-auto" dir="ltr">
            <div id="heatmapMonthLabels" class="flex gap-4 text-[10px] mb-2 opacity-30"></div>
            <div id="heatmapGrid" class="flex gap-[3px]"></div>
          </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div class="bg-black/20 p-6 rounded-2xl h-[300px]"><canvas id="pieChart"></canvas></div>
          <div class="bg-black/20 p-6 rounded-2xl h-[300px]"><canvas id="lineChart"></canvas></div>
        </div>
      </section>

    </div>
  </main>
</div>

<div id="taskModal" class="modal-bg">
  <div class="bg-[#0c1018] w-full max-w-4xl h-[85vh] rounded-3xl overflow-hidden flex flex-col border border-white/10">
    <div class="p-6 border-b border-white/5 flex justify-between items-center">
      <h2 id="mTitle" class="text-2xl font-black"></h2>
      <button onclick="closeModal()" class="text-2xl opacity-40">✕</button>
    </div>
    <div class="flex-1 overflow-y-auto p-8 grid grid-cols-3 gap-8">
      <div class="col-span-2 space-y-8">
        <div class="flex justify-between items-center"><h4 class="font-bold opacity-30">الدروس والخطوات</h4><button onclick="addSubtask()" class="bg-blue-600 px-4 py-1 rounded-lg text-sm">➕ درس</button></div>
        <div id="subList" class="space-y-6"></div>
      </div>
      <div>
        <h4 class="font-bold opacity-30 mb-4">وصف المهمة</h4>
        <textarea id="mDesc" oninput="saveDataSilently()" class="w-full bg-white/5 rounded-xl p-4 h-64 outline-none border border-white/5 resize-none"></textarea>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const FB = { apiKey: "AIzaSyBbdeRIp_cbN7LP3dKovOmfCHTxseM-zro", authDomain: "rehlaty-final.firebaseapp.com", projectId: "rehlaty-final", storageBucket: "rehlaty-final.firebasestorage.app", messagingSenderId: "332709629068", appId: "1:332709629068:web:cdfb8f40dfa4c74d31ffa9" };
const fbApp = initializeApp(FB);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const gProv = new GoogleAuthProvider();

let user = null, activTask = null;
let S = { tasks: [], todayTasks: [], certs: [], notes: [], history: {}, archive: { years: {} } };

window.saveData = async () => { renderAll(); localStorage.setItem("rehlaty_v4", JSON.stringify(S)); if(user) await setDoc(doc(db, "rehlaty_users", user.uid), S); };
window.saveDataSilently = async () => { localStorage.setItem("rehlaty_v4", JSON.stringify(S)); if(user) await setDoc(doc(db, "rehlaty_users", user.uid), S); };

// Today
function renderToday() {
  document.getElementById("todayList").innerHTML = S.todayTasks.map(t => `
    <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleToday('${t.id}')" class="w-6 h-6 rounded-full">
      <span class="flex-1 ${t.done?'line-through opacity-30':''}">${t.text}</span>
      <button onclick="delToday('${t.id}')" class="opacity-20">✕</button>
    </div>`).join("");
}
window.addTodayTask = () => { const inp = document.getElementById("todayIn"); if(!inp.value) return; S.todayTasks.unshift({id:Date.now(), text:inp.value, done:false}); inp.value=""; saveData(); };
window.toggleToday = id => { const t = S.todayTasks.find(x=>x.id==id); t.done = !t.done; saveData(); };
window.delToday = id => { S.todayTasks = S.todayTasks.filter(x=>x.id!=id); saveData(); };

// Kanban
function renderKanban() {
  const cols = {todo:"", inprogress:"", done:""};
  S.tasks.forEach(t => {
    cols[t.status] += `<div class="task-card relative" draggable="true" ondragstart="drag(event, '${t.id}')" style="--tc:${t.color||'#3b82f6'}">
      <h4 class="font-bold mb-2 cursor-pointer" onclick="openTask('${t.id}')">${t.text}</h4>
      <div class="flex justify-between items-center text-[10px] opacity-30 font-bold">
        <span>${t.subs?t.subs.length:0} درس</span>
        <button onclick="delTask('${t.id}')">حذف</button>
      </div>
    </div>`;
  });
  ["todo","inprogress","done"].forEach(id => document.getElementById(id).innerHTML = cols[id]);
}
window.addTask = () => { const inp = document.getElementById("kanbanIn"); if(!inp.value) return; S.tasks.unshift({id:'t'+Date.now(), text:inp.value, status:'todo', subs:[]}); inp.value=""; saveData(); };
window.drag = (ev, id) => ev.dataTransfer.setData("tid", id);
window.allowDrop = ev => ev.preventDefault();
window.drop = (ev, status) => { const id = ev.dataTransfer.getData("tid"); const t = S.tasks.find(x=>x.id==id); if(t){t.status=status; saveData();} };
window.delTask = id => { S.tasks = S.tasks.filter(x=>x.id!=id); saveData(); };

// Modal
window.openTask = id => {
  activTask = id;
  const t = S.tasks.find(x=>x.id == id);
  document.getElementById("mTitle").textContent = t.text;
  document.getElementById("mDesc").value = t.desc || "";
  renderSubs();
  document.getElementById("taskModal").classList.add("show");
};
window.closeModal = () => document.getElementById("taskModal").classList.remove("show");

function renderSubs() {
  const t = S.tasks.find(x=>x.id == activTask);
  document.getElementById("subList").innerHTML = (t.subs||[]).map((s, i) => `
    <div class="bg-white/5 p-5 rounded-2xl border border-white/5 space-y-4">
      <div class="flex items-center gap-3"><input type="checkbox" ${s.done?'checked':''} onchange="toggleSub(${i})"><span class="font-bold flex-1">${s.text}</span><button onclick="delSub(${i})" class="opacity-20">✕</button></div>
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <div class="flex justify-between items-center text-[10px] opacity-30 font-bold"><span>الفيديوهات</span><button onclick="addSubVid(${i})">➕ فيديو</button></div>
          ${(s.vids||[]).map((v, vi) => `<div class="flex gap-2"><input type="text" value="${v}" onchange="updateSubVid(${i},${vi},this.value)" class="flex-1 bg-black/20 p-2 rounded-lg text-xs outline-none"></div>`).join("")}
        </div>
        <div class="space-y-2">
          <div class="flex justify-between items-center text-[10px] opacity-30 font-bold"><span>ملاحظات الدرس</span><button onclick="addSubNote(${i})">➕ نص</button></div>
          ${(s.notes||[]).map((n, ni) => `<textarea oninput="updateSubNote(${i},${ni},this.value)" class="w-full bg-black/20 p-2 rounded-lg text-xs outline-none h-16 resize-none">${n}</textarea>`).join("")}
        </div>
      </div>
    </div>`).join("");
}
window.addSubtask = () => { const t = S.tasks.find(x=>x.id == activTask); const n = prompt("اسم الدرس:"); if(n){t.subs.push({text:n, done:false, vids:[], notes:[]}); renderSubs(); saveDataSilently();} };
window.toggleSub = i => { S.tasks.find(x=>x.id==activTask).subs[i].done = !S.tasks.find(x=>x.id==activTask).subs[i].done; renderSubs(); saveDataSilently(); };
window.delSub = i => { S.tasks.find(x=>x.id==activTask).subs.splice(i,1); renderSubs(); saveDataSilently(); };
window.addSubVid = i => { S.tasks.find(x=>x.id==activTask).subs[i].vids.push(""); renderSubs(); };
window.updateSubVid = (i, vi, v) => { S.tasks.find(x=>x.id==activTask).subs[i].vids[vi] = v; saveDataSilently(); };
window.addSubNote = i => { S.tasks.find(x=>x.id==activTask).subs[i].notes.push(""); renderSubs(); };
window.updateSubNote = (i, ni, v) => { S.tasks.find(x=>x.id==activTask).subs[i].notes[ni] = v; saveDataSilently(); };

// Notes
function renderNotes() {
  document.getElementById("notesBoard").innerHTML = S.notes.map(n => `
    <div class="note-card" style="--note-bg: ${n.color||'#fde047'}">
      <div class="flex justify-between mb-2"><input type="color" value="${n.color||'#fde047'}" onchange="updateNoteColor('${n.id}', this.value)" class="bg-transparent border-none w-5 h-5 cursor-pointer"><button onclick="delNote('${n.id}')">✕</button></div>
      <textarea oninput="updateNoteText('${n.id}', this.value)">${n.text||""}</textarea>
    </div>`).join("");
}
window.addNote = () => { S.notes.unshift({id:Date.now(), text:"", color:"#fde047"}); renderNotes(); saveDataSilently(); };
window.updateNoteText = (id, v) => { S.notes.find(x=>x.id==id).text = v; saveDataSilently(); };
window.updateNoteColor = (id, v) => { S.notes.find(x=>x.id==id).color = v; renderNotes(); saveDataSilently(); };
window.delNote = id => { if(confirm("حذف؟")){S.notes = S.notes.filter(x=>x.id!=id); renderNotes(); saveDataSilently();} };

// Certs
function renderCerts() {
  document.getElementById("certsList").innerHTML = S.certs.map(c => `
    <div class="cert-card" onclick="window.open('${c.url||'#'}')">
      <img src="${c.data}">
      <button onclick="event.stopPropagation(); delCert('${c.id}')" class="absolute top-2 left-2 bg-red-600 p-1 text-[10px] rounded">حذف</button>
    </div>`).join("");
}
window.handleCertUpload = inp => {
  const f = inp.files[0]; const r = new FileReader();
  r.onload = e => { const url = prompt("رابط الدرايف:"); S.certs.unshift({id:Date.now(), data:e.target.result, url}); renderCerts(); saveData(); };
  r.readAsDataURL(f);
};
window.delCert = id => { S.certs = S.certs.filter(x=>x.id!=id); renderCerts(); saveData(); };

// Analytics
function renderHeatmap() {
  const grid = document.getElementById("heatmapGrid"), labels = document.getElementById("heatmapMonthLabels");
  const year = new Date().getFullYear();
  let html = "", mLabels = "";
  const cursor = new Date(year, 0, 1); cursor.setDate(cursor.getDate() - cursor.getDay());
  const monthNames = ["يناير","فبراير","مارس","إبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  
  for(let i=0; i<53; i++) {
    let colHtml = `<div class="hm-col ${cursor.getDate()<=7 ? 'hm-month-sep' : ''}">`;
    if(cursor.getDate()<=7) mLabels += `<div>${monthNames[cursor.getMonth()]}</div>`;
    for(let j=0; j<7; j++) {
      const dStr = cursor.toISOString().split("T")[0];
      const val = S.history[dStr] || 0;
      const color = val == 0 ? 'rgba(255,255,255,0.05)' : val < 50 ? '#064e3b' : '#10b981';
      colHtml += `<div class="hm-cell" title="${dStr}: ${val}%" style="background:${color}"></div>`;
      cursor.setDate(cursor.getDate() + 1);
    }
    html += colHtml + "</div>";
  }
  grid.innerHTML = html; labels.innerHTML = mLabels;
}

let pieIns, lineIns;
function renderCharts() {
  const ctxP = document.getElementById("pieChart"), ctxL = document.getElementById("lineChart");
  const tagCounts = {}; S.tasks.forEach(t => tagCounts[t.tag||'عام'] = (tagCounts[t.tag||'عام']||0)+1);
  if(pieIns) pieIns.destroy();
  pieIns = new Chart(ctxP, { type:'doughnut', data:{ labels:Object.keys(tagCounts), datasets:[{data:Object.values(tagCounts), backgroundColor:['#3b82f6','#ec4899','#10b981'], borderWidth:0}] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom', labels:{color:'#8ea6cc', font:{family:'Cairo'}}}} } });

  const hL = [], hD = [];
  for(let i=6; i>=0; i--) { const d = new Date(); d.setDate(d.getDate()-i); const ds = d.toISOString().split("T")[0]; hL.push(new Intl.DateTimeFormat('ar-EG', {weekday:'short'}).format(d)); hD.push(S.history[ds]||0); }
  if(lineIns) lineIns.destroy();
  lineIns = new Chart(ctxL, { type:'line', data:{ labels:hL, datasets:[{label:'إنجاز %', data:hD, borderColor:'#3b82f6', tension:0.4}] }, options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{min:0, max:100, ticks:{color:'#46607a'}}, x:{ticks:{color:'#46607a'}} } } });
}

function renderAll() { renderToday(); renderKanban(); renderNotes(); renderCerts(); }

onAuthStateChanged(auth, async u => {
  if(u) {
    user = u; document.getElementById("uName").textContent = u.displayName;
    const snap = await getDoc(doc(db, "rehlaty_users", u.uid));
    if(snap.exists()) S = {...S, ...snap.data()};
    renderAll();
  }
});

window.loginWithGoogle = () => signInWithPopup(auth, gProv);
window.switchTab = t => {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById("sec-"+t).classList.add("active");
  if(t == 'extras') { setTimeout(() => { renderHeatmap(); renderCharts(); }, 100); }
};

setInterval(() => {
  const now = new Date(); document.getElementById("dateDisplay").textContent = now.toLocaleDateString('ar-EG', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const ds = now.toISOString().split("T")[0];
  const done = S.todayTasks.filter(t=>t.done).length, tot = S.todayTasks.length;
  if(tot>0) S.history[ds] = Math.round(done/tot*100);
}, 1000);
</script>
</body>
</html>
